<div class="space-y-4">
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
    <h2 class="text-xl font-bold text-gray-800">Atributos de Productos</h2>
    <div class="flex flex-wrap gap-2">
      <input
        type="text"
        [(ngModel)]="searchTerm"
        (ngModelChange)="applyFilter()"
        placeholder="Buscar..."
        class="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 w-full sm:w-48"
      />
      <button
        (click)="openCreate()"
        class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-700 transition-colors whitespace-nowrap"
      >
        + Nuevo Atributo
      </button>
    </div>
  </div>

  <div class="bg-white rounded-lg shadow overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-sm text-left">
        <thead class="bg-blue-50 text-blue-700 uppercase text-xs">
          <tr>
            <th class="px-4 py-3">ID</th>
            <th class="px-4 py-3">Nombre</th>
            <th class="px-4 py-3">Tipo de Dato</th>
            <th class="px-4 py-3">Unidad</th>
            <th class="px-4 py-3">Estado</th>
            <th class="px-4 py-3 text-right">Acciones</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-100">
          <tr *ngIf="loading">
            <td colspan="6" class="px-4 py-8 text-center text-gray-500">Cargando...</td>
          </tr>
          <tr *ngIf="!loading && filteredAtributos.length === 0">
            <td colspan="6" class="px-4 py-8 text-center text-gray-500">
              No se encontraron atributos
            </td>
          </tr>
          <tr *ngFor="let a of pagedAtributos" class="hover:bg-gray-50">
            <td class="px-4 py-3 text-gray-600">{{ a.idAtributo }}</td>
            <td class="px-4 py-3 font-medium text-gray-800">{{ a.nombreAtributo }}</td>
            <td class="px-4 py-3 text-gray-600">{{ a.tipoDato }}</td>
            <td class="px-4 py-3 text-gray-600">{{ a.unidad || '-' }}</td>
            <td class="px-4 py-3">
              <span
                class="px-2 py-0.5 rounded-full text-xs font-medium"
                [class]="a.activo ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'"
              >
                {{ a.activo ? 'Activo' : 'Inactivo' }}
              </span>
            </td>
            <td class="px-4 py-3 text-right">
              <div class="flex justify-end gap-1">
                <button
                  (click)="openEdit(a)"
                  title="Editar"
                  class="p-1.5 text-blue-600 hover:bg-blue-50 rounded transition-colors"
                >
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"
                    />
                  </svg>
                </button>
                <button
                  (click)="toggleActivo(a)"
                  [title]="a.activo ? 'Desactivar' : 'Activar'"
                  class="p-1.5 rounded transition-colors"
                  [class]="
                    a.activo ? 'text-red-600 hover:bg-red-50' : 'text-green-600 hover:bg-green-50'
                  "
                >
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path
                      *ngIf="a.activo"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"
                    />
                    <path
                      *ngIf="!a.activo"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"
                    />
                  </svg>
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    <app-pagination
      [totalItems]="filteredAtributos.length"
      [pageSize]="pageSize"
      [currentPage]="currentPage"
      (pageChange)="currentPage = $event"
    >
    </app-pagination>
  </div>
</div>

<!-- Modal crear/editar -->
<div *ngIf="showModal" class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <div class="fixed inset-0 bg-black/40" (click)="showModal = false"></div>
  <div class="bg-white rounded-lg shadow-xl w-full max-w-md relative z-10">
    <div class="px-6 py-4 border-b border-gray-200">
      <h3 class="text-lg font-semibold text-gray-800">
        {{ editMode ? 'Editar' : 'Nuevo' }} Atributo
      </h3>
    </div>
    <div class="p-6 space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Nombre *</label>
        <input
          type="text"
          [(ngModel)]="form.nombreAtributo"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Ej: Capacidad de Batería"
        />
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Tipo de Dato *</label>
          <select
            [(ngModel)]="form.tipoDato"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          >
            <option *ngFor="let t of tiposDato" [value]="t">{{ t }}</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Unidad</label>
          <input
            type="text"
            [(ngModel)]="form.unidad"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="Ej: mAh, GB"
          />
        </div>
      </div>
    </div>
    <div class="px-6 py-4 border-t border-gray-200 flex justify-end gap-2">
      <button
        (click)="showModal = false"
        class="px-4 py-2 text-sm text-gray-700 border border-gray-300 rounded-lg hover:bg-gray-50"
      >
        Cancelar
      </button>
      <button
        (click)="save()"
        class="px-4 py-2 text-sm text-white bg-blue-600 rounded-lg hover:bg-blue-700"
      >
        {{ editMode ? 'Actualizar' : 'Guardar' }}
      </button>
    </div>
  </div>
</div>
