<div class="space-y-4 max-w-lg">
  <h2 class="text-xl font-bold text-gray-800">Configuración del Sistema</h2>

  <div *ngIf="loading" class="text-center py-8 text-gray-500">Cargando...</div>

  <div *ngIf="!loading" class="bg-white rounded-lg shadow p-6 space-y-6">
    <div>
      <h3 class="text-base font-semibold text-gray-800 mb-4">Parámetros Fiscales</h3>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Porcentaje de IVA (%)</label>
          <div class="flex items-center gap-3">
            <input type="number" [(ngModel)]="config.ivaPorcentaje"
                   min="0" max="100" step="0.01"
                   class="w-40 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <span class="text-sm text-gray-500">Actualmente: {{ config.ivaPorcentaje }}%</span>
          </div>
          <p class="text-xs text-gray-400 mt-1">Este valor se aplica automáticamente al generar facturas.</p>
        </div>
      </div>
    </div>

    <div class="pt-4 border-t border-gray-200">
      <button (click)="save()" [disabled]="saving"
              class="bg-blue-600 text-white px-6 py-2.5 rounded-lg text-sm font-medium hover:bg-blue-700 transition-colors disabled:opacity-50">
        {{ saving ? 'Guardando...' : 'Guardar Cambios' }}
      </button>
    </div>
  </div>

  <!-- Administración de Atributos -->
  <div class="bg-white rounded-lg shadow p-6 flex items-center justify-between">
    <div>
      <h3 class="text-base font-semibold text-gray-800">Atributos de Productos</h3>
      <p class="text-sm text-gray-500 mt-0.5">Gestiona el catálogo de atributos disponibles para asignar a los productos.</p>
    </div>
    <a routerLink="/atributos"
       class="inline-flex items-center gap-2 px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
      </svg>
      Administrar
    </a>
  </div>
</div>
