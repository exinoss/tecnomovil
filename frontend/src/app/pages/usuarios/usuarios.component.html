<div class="space-y-4">
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
    <h2 class="text-xl font-bold text-gray-800">Usuarios</h2>
    <div class="flex gap-2">
      <input type="text" [(ngModel)]="searchTerm" (ngModelChange)="applyFilter()"
             placeholder="Buscar usuario..."
             class="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 w-full sm:w-64">
      <button (click)="openCreate()"
              class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-700 transition-colors whitespace-nowrap">
        + Agregar
      </button>
    </div>
  </div>

  <div class="bg-white rounded-lg shadow overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-sm text-left">
        <thead class="bg-blue-50 text-blue-700 uppercase text-xs">
          <tr>
            <th class="px-4 py-3">ID</th>
            <th class="px-4 py-3">Nombres</th>
            <th class="px-4 py-3">Identificación</th>
            <th class="px-4 py-3">Correo</th>
            <th class="px-4 py-3">Rol</th>
            <th class="px-4 py-3">Estado</th>
            <th class="px-4 py-3 text-right">Acciones</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-100">
          <tr *ngIf="loading">
            <td colspan="7" class="px-4 py-8 text-center text-gray-500">Cargando...</td>
          </tr>
          <tr *ngIf="!loading && filteredUsuarios.length === 0">
            <td colspan="7" class="px-4 py-8 text-center text-gray-500">No se encontraron usuarios</td>
          </tr>
          <tr *ngFor="let u of filteredUsuarios" class="hover:bg-gray-50">
            <td class="px-4 py-3 text-gray-600">{{ u.idUsuario }}</td>
            <td class="px-4 py-3 font-medium text-gray-800">{{ u.nombres }}</td>
            <td class="px-4 py-3 text-gray-600">{{ u.identificacion }}</td>
            <td class="px-4 py-3 text-gray-600">{{ u.correo || '-' }}</td>
            <td class="px-4 py-3">
              <span class="px-2 py-1 rounded-full text-xs font-medium"
                    [ngClass]="{
                      'bg-blue-100 text-blue-700': u.rol === 'Admin',
                      'bg-yellow-100 text-yellow-700': u.rol === 'Tecnico',
                      'bg-green-100 text-green-700': u.rol === 'Vendedor'
                    }">
                {{ u.rol }}
              </span>
            </td>
            <td class="px-4 py-3">
              <span class="px-2 py-1 rounded-full text-xs font-medium"
                    [ngClass]="u.activo ? 'bg-blue-100 text-blue-700' : 'bg-gray-100 text-gray-500'">
                {{ u.activo ? 'Activo' : 'Inactivo' }}
              </span>
            </td>
            <td class="px-4 py-3 text-right">
              <div class="flex justify-end gap-1">
                <button (click)="openEdit(u)" title="Editar"
                        class="p-1.5 text-blue-600 hover:bg-blue-50 rounded transition-colors">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                  </svg>
                </button>
                <button (click)="openChangePassword(u)" title="Cambiar contraseña"
                        class="p-1.5 text-gray-600 hover:bg-gray-50 rounded transition-colors">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
                  </svg>
                </button>
                <button (click)="toggleActivo(u)"
                        [title]="!canToggle(u) ? (u.idUsuario === currentUserId ? 'No puedes deshabilitarte a ti mismo' : 'No se puede deshabilitar a un Admin') : (u.activo ? 'Deshabilitar' : 'Habilitar')"
                        [disabled]="!canToggle(u)"
                        class="p-1.5 rounded transition-colors"
                        [style.opacity]="canToggle(u) ? '1' : '0.3'"
                        [style.cursor]="canToggle(u) ? 'pointer' : 'not-allowed'"
                        [style.color]="!canToggle(u) ? '#9ca3af' : (u.activo ? '#dc2626' : '#16a34a')">
                  <svg *ngIf="u.activo" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636" />
                  </svg>
                  <svg *ngIf="!u.activo" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                  </svg>
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modal usuario -->
<div *ngIf="showModal" class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <div class="fixed inset-0 bg-black/40" (click)="closeModal()"></div>
  <div class="bg-white rounded-lg shadow-xl w-full max-w-lg relative z-10">
    <div class="px-6 py-4 border-b border-gray-200">
      <h3 class="text-lg font-semibold text-gray-800">{{ editMode ? 'Editar' : 'Nuevo' }} Usuario</h3>
    </div>
    <div class="p-6 space-y-4 max-h-[70vh] overflow-y-auto">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Nombres *</label>
        <input type="text" [(ngModel)]="form.nombres"
               class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Correo</label>
        <input type="email" [(ngModel)]="form.correo"
               class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Tipo Identificación</label>
          <select [(ngModel)]="form.tipoIdentificacion"
                  class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option *ngFor="let t of tiposId" [value]="t">{{ t }}</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Identificación *</label>
          <input type="text" [(ngModel)]="form.identificacion"
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Rol *</label>
          <select [(ngModel)]="form.rol"
                  class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option *ngFor="let r of roles" [value]="r">{{ r }}</option>
          </select>
        </div>
        <div *ngIf="!editMode">
          <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña *</label>
          <input type="password" [(ngModel)]="form.password"
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
      </div>
      <div class="flex items-center gap-2">
        <input type="checkbox" [(ngModel)]="form.activo" id="activoUser"
               class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
        <label for="activoUser" class="text-sm text-gray-700">Activo</label>
      </div>
    </div>
    <div class="px-6 py-4 border-t border-gray-200 flex justify-end gap-2">
      <button (click)="closeModal()"
              class="px-4 py-2 text-sm text-gray-700 border border-gray-300 rounded-lg hover:bg-gray-50">Cancelar</button>
      <button (click)="save()"
              class="px-4 py-2 text-sm text-white bg-blue-600 rounded-lg hover:bg-blue-700">
        {{ editMode ? 'Actualizar' : 'Guardar' }}
      </button>
    </div>
  </div>
</div>

<!-- Modal cambiar contraseña -->
<div *ngIf="showPasswordModal" class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <div class="fixed inset-0 bg-black/40" (click)="showPasswordModal = false"></div>
  <div class="bg-white rounded-lg shadow-xl w-full max-w-sm relative z-10">
    <div class="px-6 py-4 border-b border-gray-200">
      <h3 class="text-lg font-semibold text-gray-800">Cambiar Contraseña</h3>
    </div>
    <div class="p-6">
      <label class="block text-sm font-medium text-gray-700 mb-1">Nueva Contraseña</label>
      <input type="password" [(ngModel)]="nuevaPassword"
             class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <div class="px-6 py-4 border-t border-gray-200 flex justify-end gap-2">
      <button (click)="showPasswordModal = false"
              class="px-4 py-2 text-sm text-gray-700 border border-gray-300 rounded-lg hover:bg-gray-50">Cancelar</button>
      <button (click)="cambiarPassword()"
              class="px-4 py-2 text-sm text-white bg-blue-600 rounded-lg hover:bg-blue-700">Guardar</button>
    </div>
  </div>
</div>
