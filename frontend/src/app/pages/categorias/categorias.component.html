<div class="space-y-4">
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
    <h2 class="text-xl font-bold text-gray-800">Categorías</h2>
    <div class="flex gap-2">
      <input
        type="text"
        [(ngModel)]="searchTerm"
        (ngModelChange)="applyFilter()"
        placeholder="Buscar categoría..."
        class="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 w-full sm:w-64"
      />
      <button
        (click)="openCreate()"
        class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-700 transition-colors whitespace-nowrap"
      >
        + Agregar
      </button>
    </div>
  </div>

  <!-- Tabla -->
  <div class="bg-white rounded-lg shadow overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-sm text-left">
        <thead class="bg-blue-50 text-blue-700 uppercase text-xs">
          <tr>
            <th class="px-4 py-3">ID</th>
            <th class="px-4 py-3">Nombre</th>
            <th class="px-4 py-3">Estado</th>
            <th class="px-4 py-3 text-right">Acciones</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-100">
          <tr *ngIf="loading">
            <td colspan="4" class="px-4 py-8 text-center text-gray-500">Cargando...</td>
          </tr>
          <tr *ngIf="!loading && filteredCategorias.length === 0">
            <td colspan="4" class="px-4 py-8 text-center text-gray-500">
              No se encontraron categorías
            </td>
          </tr>
          <tr *ngFor="let cat of pagedCategorias" class="hover:bg-gray-50">
            <td class="px-4 py-3 text-gray-600">{{ cat.idCategoria }}</td>
            <td class="px-4 py-3 font-medium text-gray-800">{{ cat.nombreCategoria }}</td>
            <td class="px-4 py-3">
              <span
                class="px-2 py-1 rounded-full text-xs font-medium"
                [ngClass]="cat.activo ? 'bg-blue-100 text-blue-700' : 'bg-gray-100 text-gray-500'"
              >
                {{ cat.activo ? 'Activo' : 'Inactivo' }}
              </span>
            </td>
            <td class="px-4 py-3 text-right">
              <div class="flex justify-end gap-1">
                <button
                  (click)="openEdit(cat)"
                  title="Editar"
                  class="p-1.5 text-blue-600 hover:bg-blue-50 rounded transition-colors"
                >
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"
                    />
                  </svg>
                </button>
                <button
                  (click)="toggleActivo(cat)"
                  [title]="cat.activo ? 'Deshabilitar' : 'Habilitar'"
                  class="p-1.5 rounded transition-colors"
                  [ngClass]="
                    cat.activo ? 'text-red-600 hover:bg-red-50' : 'text-green-600 hover:bg-green-50'
                  "
                >
                  <svg
                    *ngIf="cat.activo"
                    class="w-4 h-4"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"
                    />
                  </svg>
                  <svg
                    *ngIf="!cat.activo"
                    class="w-4 h-4"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"
                    />
                  </svg>
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    <app-pagination
      [totalItems]="filteredCategorias.length"
      [pageSize]="pageSize"
      [currentPage]="currentPage"
      (pageChange)="currentPage = $event"
    >
    </app-pagination>
  </div>
</div>

<!-- Modal -->
<div *ngIf="showModal" class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <div class="fixed inset-0 bg-black/40" (click)="closeModal()"></div>
  <div class="bg-white rounded-lg shadow-xl w-full max-w-md relative z-10">
    <div class="px-6 py-4 border-b border-gray-200">
      <h3 class="text-lg font-semibold text-gray-800">
        {{ editMode ? 'Editar' : 'Nueva' }} Categoría
      </h3>
    </div>
    <div class="p-6 space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Nombre</label>
        <input
          type="text"
          [(ngModel)]="form.nombreCategoria"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Nombre de la categoría"
        />
      </div>
      <div class="flex items-center gap-2">
        <input
          type="checkbox"
          [(ngModel)]="form.activo"
          id="activo"
          class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500"
        />
        <label for="activo" class="text-sm text-gray-700">Activo</label>
      </div>
    </div>
    <div class="px-6 py-4 border-t border-gray-200 flex justify-end gap-2">
      <button
        (click)="closeModal()"
        class="px-4 py-2 text-sm text-gray-700 border border-gray-300 rounded-lg hover:bg-gray-50"
      >
        Cancelar
      </button>
      <button
        (click)="save()"
        class="px-4 py-2 text-sm text-white bg-blue-600 rounded-lg hover:bg-blue-700"
      >
        {{ editMode ? 'Actualizar' : 'Guardar' }}
      </button>
    </div>
  </div>
</div>
